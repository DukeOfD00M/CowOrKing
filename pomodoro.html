<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    /* Work-Farben */
    --work-color:        #e05c2a;
    --work-color-dim:    rgba(224, 92, 42, 0.15);
    --work-glow:         rgba(224, 92, 42, 0.4);
    /* Break-Farben */
    --break-color:       #2ab8a0;
    --break-color-dim:   rgba(42, 184, 160, 0.15);
    --break-glow:        rgba(42, 184, 160, 0.4);
    /* Aktive Farben (werden per JS gesetzt) */
    --active-color:      #e05c2a;
    --active-color-dim:  rgba(224, 92, 42, 0.15);
    --active-glow:       rgba(224, 92, 42, 0.4);
    /* Layout */
    --bg-color:          #0f0f0f;
    --bg-opacity:        0.92;
    --widget-size:       220px;
    --font-size-time:    72px;
    --font-size-label:   13px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: transparent;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    font-family: 'DM Mono', monospace;
}

#widget {
    position: relative;
    width: var(--widget-size);
    height: var(--widget-size);
    background: var(--bg-color);
    opacity: var(--bg-opacity);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: opacity 0.5s;
}

/* Äußerer Glow-Ring */
#widget::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(
        var(--active-color) calc(var(--progress, 1) * 360deg),
        rgba(255,255,255,0.06) 0deg
    );
    transition: background 1s linear;
    z-index: 0;
}

/* Innere Abdeckung (Donut-Effekt) */
#widget::after {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: var(--bg-color);
    z-index: 1;
}

/* Inhalt über dem Ring */
#content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
}

/* ── Kreis-Modus (Standard) ── */
#time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: var(--font-size-time);
    color: var(--active-color);
    line-height: 1;
    letter-spacing: 0.02em;
    text-shadow: 0 0 30px var(--active-glow);
    transition: color 0.8s, text-shadow 0.8s;
}

#mode-label {
    font-size: var(--font-size-label);
    color: var(--active-color);
    opacity: 0.6;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.8s;
}

#status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--active-color);
    margin-top: 4px;
    opacity: 0.5;
    transition: background 0.8s, opacity 0.3s;
}

/* Pulsieren wenn aktiv */
#status-dot.running {
    opacity: 1;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%       { transform: scale(1.6); opacity: 0.5; }
}

/* Paused: Ring blinkt */
#widget.paused::before {
    animation: ringBlink 1.5s ease-in-out infinite;
}

@keyframes ringBlink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
}

/* Modus-Wechsel: kurzer Flash */
@keyframes modeFlash {
    0%   { opacity: 0.3; transform: scale(0.97); }
    100% { opacity: 1;   transform: scale(1); }
}

#widget.flash { animation: modeFlash 0.5s ease; }
</style>
</head>
<body>

<div id="widget">
    <div id="content">
        <div id="time-display">25:00</div>
        <div id="mode-label">work</div>
        <div id="status-dot"></div>
    </div>
</div>

<script>
const JSON_URL = './json/pomodoro.json';

/* ── Defaults ── */
const DEFAULTS = {
    workMinutes:  25,
    breakMinutes: 5,
    autoTimer:    false,
    mode:         'work',   // 'work' | 'break'
    state:        'idle',   // 'idle' | 'running' | 'paused'
    display:      'circle', // 'circle' | 'number'
    bgColor:      '#0f0f0f',
    bgOpacity:    '0.92',
    widgetSize:   '220px',
    workColor:    '#e05c2a',
    breakColor:   '#2ab8a0',
};

/* ── State ── */
let cfg        = { ...DEFAULTS };
let remaining  = cfg.workMinutes * 60; // Sekunden
let totalSecs  = cfg.workMinutes * 60;
let ticker     = null;
let lastJson   = '';

/* ── CSS-Variablen setzen ── */
const root = document.documentElement;

function setVar(name, val) {
    root.style.setProperty(name, val);
}

function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
}

function applyColors() {
    const wc = cfg.workColor  || DEFAULTS.workColor;
    const bc = cfg.breakColor || DEFAULTS.breakColor;
    setVar('--work-color',      wc);
    setVar('--work-color-dim',  hexToRgba(wc, 0.15));
    setVar('--work-glow',       hexToRgba(wc, 0.4));
    setVar('--break-color',     bc);
    setVar('--break-color-dim', hexToRgba(bc, 0.15));
    setVar('--break-glow',      hexToRgba(bc, 0.4));
    updateActiveColor();
}

function updateActiveColor() {
    const isWork = cfg.mode === 'work';
    const color  = isWork ? (cfg.workColor  || DEFAULTS.workColor)
                           : (cfg.breakColor || DEFAULTS.breakColor);
    setVar('--active-color',     color);
    setVar('--active-color-dim', hexToRgba(color, 0.15));
    setVar('--active-glow',      hexToRgba(color, 0.4));
}

function applyTheme(theme) {
    if (!theme) return;
    if (theme.bgColor)    setVar('--bg-color',    theme.bgColor);
    if (theme.bgOpacity)  setVar('--bg-opacity',  theme.bgOpacity);
    if (theme.widgetSize) setVar('--widget-size',  theme.widgetSize);
    if (theme.workColor)  cfg.workColor  = theme.workColor;
    if (theme.breakColor) cfg.breakColor = theme.breakColor;
    applyColors();
}

/* ── Render ── */
function renderTime() {
    const m = String(Math.floor(remaining / 60)).padStart(2, '0');
    const s = String(remaining % 60).padStart(2, '0');
    document.getElementById('time-display').textContent = `${m}:${s}`;
}

function renderProgress() {
    const progress = totalSecs > 0 ? remaining / totalSecs : 1;
    setVar('--progress', progress.toFixed(4));
}

function renderMode() {
    document.getElementById('mode-label').textContent =
        cfg.mode === 'work' ? 'work' : 'break';
    updateActiveColor();

    const widget = document.getElementById('widget');
    widget.classList.remove('flash');
    void widget.offsetWidth; // reflow für Animation-Reset
    widget.classList.add('flash');
    setTimeout(() => widget.classList.remove('flash'), 500);
}

function renderState() {
    const dot    = document.getElementById('status-dot');
    const widget = document.getElementById('widget');

    dot.classList.toggle('running', cfg.state === 'running');
    widget.classList.toggle('paused', cfg.state === 'paused');
}

function fullRender() {
    renderTime();
    renderProgress();
    renderMode();
    renderState();
}

/* ── Timer-Logik ── */
function startTicker() {
    if (ticker) clearInterval(ticker);
    ticker = setInterval(() => {
        if (cfg.state !== 'running') return;
        if (remaining > 0) {
            remaining--;
            renderTime();
            renderProgress();
        } else {
            onTimerDone();
        }
    }, 1000);
}

function stopTicker() {
    if (ticker) { clearInterval(ticker); ticker = null; }
}

function onTimerDone() {
    stopTicker();
    if (cfg.autoTimer) {
        // Automatisch nächsten Modus starten
        switchMode();
        startTimer();
    } else {
        cfg.state = 'idle';
        renderState();
    }
}

function switchMode() {
    cfg.mode = cfg.mode === 'work' ? 'break' : 'work';
    resetTimer();
    renderMode();
}

function resetTimer() {
    const mins = cfg.mode === 'work'
        ? (cfg.workMinutes  || DEFAULTS.workMinutes)
        : (cfg.breakMinutes || DEFAULTS.breakMinutes);
    totalSecs = mins * 60;
    remaining = totalSecs;
    renderTime();
    renderProgress();
}

function startTimer() {
    if (cfg.state === 'idle') resetTimer();
    cfg.state = 'running';
    renderState();
    startTicker();
}

function pauseTimer() {
    cfg.state = 'paused';
    renderState();
}

function resumeTimer() {
    cfg.state = 'running';
    renderState();
}

function stopTimer() {
    stopTicker();
    cfg.state = 'idle';
    resetTimer();
    renderState();
}

/* ── JSON Polling ── */
/*
  pomodoro.json Struktur:
  {
    "command":      "start" | "pause" | "resume" | "stop" | "work" | "break" | null,
    "autoTimer":    true | false,
    "workMinutes":  25,
    "breakMinutes": 5,
    "display":      "circle" | "number",
    "theme": {
      "bgColor":    "#0f0f0f",
      "bgOpacity":  "0.92",
      "widgetSize": "220px",
      "workColor":  "#e05c2a",
      "breakColor": "#2ab8a0"
    }
  }

  Streamer.bot setzt "command" auf den gewünschten Befehl,
  das Widget führt ihn aus und Streamer.bot setzt command danach auf null.
*/
async function poll() {
    try {
        const res  = await fetch(JSON_URL + '?t=' + Date.now());
        const text = await res.text();
        if (text !== lastJson) {
            lastJson = text;
            const data = JSON.parse(text);
            handleConfig(data);
        }
    } catch (e) {
        console.warn('pomodoro.json laden fehlgeschlagen:', e);
    }
    setTimeout(poll, 1000); // 1s Polling für flüssige Steuerung
}

function handleConfig(data) {
    // Theme
    if (data.theme) applyTheme(data.theme);

    // Konfiguration übernehmen
    if (data.workMinutes  !== undefined) cfg.workMinutes  = data.workMinutes;
    if (data.breakMinutes !== undefined) cfg.breakMinutes = data.breakMinutes;
    if (data.autoTimer    !== undefined) cfg.autoTimer    = data.autoTimer;

    // Display-Modus
    if (data.display !== undefined && data.display !== cfg.display) {
        cfg.display = data.display;
        applyDisplayMode();
    }

    // Command ausführen
    if (data.command) {
        executeCommand(data.command);
    }
}

function executeCommand(cmd) {
    switch (cmd) {
        case 'start':  startTimer();  break;
        case 'pause':  pauseTimer();  break;
        case 'resume': resumeTimer(); break;
        case 'stop':   stopTimer();   break;
        case 'work':
            stopTicker();
            cfg.mode  = 'work';
            cfg.state = 'idle';
            resetTimer();
            renderMode();
            renderState();
            break;
        case 'break':
            stopTicker();
            cfg.mode  = 'break';
            cfg.state = 'idle';
            resetTimer();
            renderMode();
            renderState();
            break;
    }
}

/* ── Display-Modus: Kreis ↔ Zahl ── */
function applyDisplayMode() {
    if (cfg.display === 'number') {
        setVar('--font-size-time', '88px');
        setVar('--widget-size', cfg.theme?.widgetSize || '220px');
        // Ring ausblenden
        document.getElementById('widget').style.setProperty('--progress', '0');
    } else {
        setVar('--font-size-time', '72px');
    }
    renderProgress();
}

/* ── Init ── */
applyColors();
resetTimer();
fullRender();
poll();
</script>
</body>
</html>
